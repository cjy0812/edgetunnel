name: Deploy to Cloudflare Workers

on:
  push:
    paths:
      - '_worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Use Node.js 20+
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare
        run: wrangler deploy
